services:
  discord-prowlarr-bot:
    build: .
    container_name: discord-prowlarr-bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:19987:9987"
      - "6881:6881/tcp"
      - "6881:6881/udp"
    networks:
      - arr-network

networks:
  arr-network:
    external: true
    name: jellyfinarr-stack_default
